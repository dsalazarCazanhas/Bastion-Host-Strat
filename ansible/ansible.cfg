[defaults]
inventory           = inventory/hosts.ini
remote_user         = ubuntu
host_key_checking   = True
retry_files_enabled = False
deprecation_warnings = False

# Use the built-in default callback with yaml output (community.general.yaml is deprecated)
stdout_callback = default
result_format   = yaml

[ssh_connection]
# ControlPath must point to the native Linux filesystem — NTFS (/mnt/) does not
# support Unix sockets, which causes ControlMaster to hang silently on WSL.
# ControlMaster is enabled per-group in the inventory: [bastion:vars] enables it,
# [private:vars] disables it — the private server connection goes through ProxyCommand
# and inheriting ControlMaster causes port 65535 / UNKNOWN timeout errors.
ssh_args    = -o ControlPath=/tmp/ansible-ssh-%h-%p-%r -o ServerAliveInterval=30
pipelining  = True
